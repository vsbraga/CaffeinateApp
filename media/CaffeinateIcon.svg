<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- macOS squircle clip path -->
    <clipPath id="squircle">
      <path d="M512 4C804 4 1020 220 1020 512S804 1020 512 1020S4 804 4 512S220 4 512 4Z"/>
    </clipPath>
    
    <!-- macOS rounded superellipse mask -->
    <clipPath id="iconMask">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>

    <!-- Background gradient - warm teal/blue -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B8A72"/>
      <stop offset="50%" stop-color="#3D7A6B"/>
      <stop offset="100%" stop-color="#2A5E52"/>
    </linearGradient>

    <!-- Glass material gradient -->
    <linearGradient id="glassGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Glass edge highlight -->
    <linearGradient id="glassEdge" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Specular highlight -->
    <radialGradient id="specular" cx="0.35" cy="0.2" r="0.5" fx="0.35" fy="0.15">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Top specular shine -->
    <linearGradient id="topShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Steam gradient -->
    <linearGradient id="steamGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Handle glass gradient -->
    <linearGradient id="handleGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Soft inner shadow for depth -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>

    <!-- Soft drop shadow -->
    <filter id="dropShadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1a3d34" flood-opacity="0.35"/>
    </filter>

    <!-- Subtle blur for glass depth -->
    <filter id="glassBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Liquid coffee fill -->
    <linearGradient id="coffeeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5E3C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5C3A1E" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Icon mask (macOS rounded rectangle / squircle) -->
  <g clip-path="url(#iconMask)">

    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle background texture - soft radial light -->
    <circle cx="400" cy="350" r="500" fill="white" opacity="0.06"/>
    <circle cx="700" cy="700" r="400" fill="black" opacity="0.08"/>

    <!-- ============ COFFEE CUP (centered, Liquid Glass style) ============ -->
    <g filter="url(#dropShadow)" transform="translate(512, 530)">

      <!-- Cup body - simple rounded rectangle, glass material -->
      <!-- The cup is centered at origin, ~320px wide, ~340px tall -->
      
      <!-- Cup body shadow/depth layer -->
      <rect x="-160" y="-120" width="320" height="340" rx="40" ry="40" 
            fill="#1a3d34" opacity="0.15"/>

      <!-- Cup body - glass fill -->
      <rect x="-160" y="-130" width="320" height="340" rx="40" ry="40" 
            fill="url(#glassGrad)" stroke="url(#glassEdge)" stroke-width="2.5"/>

      <!-- Coffee liquid inside cup -->
      <rect x="-140" y="30" width="280" height="155" rx="30" ry="30"
            fill="url(#coffeeGrad)"/>

      <!-- Specular highlight on cup -->
      <rect x="-160" y="-130" width="320" height="340" rx="40" ry="40" 
            fill="url(#specular)"/>

      <!-- Top rim shine -->
      <rect x="-160" y="-130" width="320" height="60" rx="40" ry="30"
            fill="url(#topShine)"/>

      <!-- Thin bright edge at top of cup -->
      <line x1="-120" y1="-128" x2="120" y2="-128" 
            stroke="white" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round"/>

      <!-- ============ HANDLE (right side, glass arc) ============ -->
      <g transform="translate(160, -20)">
        <!-- Handle outer -->
        <path d="M 0,-60 
                 C 90,-60 120,-20 120,40 
                 C 120,100 90,140 0,140" 
              fill="none" stroke="url(#handleGlass)" stroke-width="38" stroke-linecap="round"/>
        
        <!-- Handle inner highlight -->
        <path d="M 0,-60 
                 C 90,-60 120,-20 120,40 
                 C 120,100 90,140 0,140" 
              fill="none" stroke="white" stroke-opacity="0.2" stroke-width="34" stroke-linecap="round"/>
        
        <!-- Handle specular edge -->
        <path d="M 5,-45 
                 C 75,-45 100,-10 100,40 
                 C 100,90 75,125 5,125" 
              fill="none" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
      </g>

      <!-- ============ STEAM WISPS ============ -->
      <g opacity="0.7">
        <!-- Left steam -->
        <path d="M -60,-130 
                 C -60,-180 -80,-200 -60,-250 
                 C -40,-300 -70,-330 -55,-380" 
              fill="none" stroke="url(#steamGrad)" stroke-width="14" stroke-linecap="round"/>
        
        <!-- Center steam -->
        <path d="M 10,-130 
                 C 10,-190 30,-210 10,-270 
                 C -10,-330 20,-360 15,-420" 
              fill="none" stroke="url(#steamGrad)" stroke-width="16" stroke-linecap="round"/>
        
        <!-- Right steam -->
        <path d="M 80,-130 
                 C 80,-175 60,-200 80,-240 
                 C 100,-280 70,-310 85,-360" 
              fill="none" stroke="url(#steamGrad)" stroke-width="12" stroke-linecap="round"/>
      </g>

    </g>

    <!-- ============ GLOBAL SPECULAR OVERLAY ============ -->
    <!-- Top-left light reflection across the whole icon -->
    <ellipse cx="380" cy="280" rx="350" ry="250" fill="white" opacity="0.04" 
             transform="rotate(-15, 380, 280)"/>

    <!-- Bottom edge subtle light -->
    <rect x="0" y="900" width="1024" height="124" rx="0" ry="0" fill="white" opacity="0.03"/>

  </g>
</svg>
